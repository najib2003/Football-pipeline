version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: football_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - football_net
  
  ingestion:
    build: ./ingestion
    container_name: football_ingestion
    env_file: .env
    depends_on:
      - postgres
    networks:
      - football_net
 
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./processing:/opt/processing
    networks:
      - football_net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - football_net

  processing:
    build: ./processing
    container_name: football_processing
    env_file: .env
    depends_on:
      - kafka
      - postgres
    networks:
      - football_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - football_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - football_net

  airflow-init:
    image: apache/airflow:2.8.0
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:football123@postgres/football
    depends_on:
      - postgres
    networks:
      - football_net

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow_webserver
    command: webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:football123@postgres/football
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    ports:
      - "8090:8080"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
    depends_on:
      - airflow-init
    networks:
      - football_net

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow_scheduler
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:football123@postgres/football
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
    depends_on:
      - airflow-init
    networks:
      - football_net

  dashboard:
    build: ./dashboard
    container_name: football_dashboard
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - postgres
    networks:
      - football_net

volumes:
  pgdata:
 
networks:
  football_net:
    driver: bridge
